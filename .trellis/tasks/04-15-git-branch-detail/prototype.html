<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Branch Detail — IDEA-style 3-Column Prototype</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 12px;
    background: #1e1e1e;
    color: #abb2bf;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    min-height: 100vh;
  }

  :root {
    --bg-primary: #282c34;
    --bg-secondary: #21252b;
    --bg-tertiary: #2c313c;
    --bg-hover: #3e4451;
    --text-primary: #abb2bf;
    --text-secondary: #828997;
    --text-muted: #5c6370;
    --border: #181a1f;
    --accent-blue: #61afef;
    --accent-green: #98c379;
    --accent-yellow: #e5c07b;
    --accent-red: #e06c75;
    --accent-purple: #c678dd;
    --badge-m: #e5c07b;
    --badge-a: #98c379;
    --badge-d: #e06c75;
    --badge-r: #c678dd;
    --badge-u: #5c6370;
    --radius: 4px;
    --graph-colors: #61afef, #98c379, #e5c07b, #c678dd, #e06c75, #56b6c2;
  }

  /* ===== Theme Bar ===== */
  .theme-bar {
    position: fixed; top: 12px; right: 12px;
    display: flex; gap: 4px;
    background: var(--bg-tertiary); padding: 4px;
    border-radius: var(--radius); border: 1px solid var(--border); z-index: 100;
  }
  .theme-btn {
    padding: 3px 8px; border: 1px solid transparent; border-radius: 3px;
    background: transparent; color: var(--text-muted); font-size: 10px; cursor: pointer;
  }
  .theme-btn.active { color: var(--accent-blue); border-color: var(--accent-blue); }
  .theme-btn:hover { color: var(--text-primary); }

  /* ===== Main Container ===== */
  .git-window {
    width: 960px; height: 640px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  /* ===== Toolbar ===== */
  .toolbar {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .toolbar-tabs { display: flex; gap: 2px; margin-right: 12px; }
  .toolbar-tab {
    padding: 3px 10px; border: 1px solid transparent; border-radius: var(--radius);
    background: transparent; color: var(--text-muted); font-size: 11px;
    cursor: pointer; font-weight: 500; transition: all 0.15s;
  }
  .toolbar-tab:hover { color: var(--text-secondary); }
  .toolbar-tab.active { color: var(--accent-blue); border-color: var(--accent-blue); background: rgba(97,175,239,0.08); }

  .search-box {
    flex: 1; max-width: 280px;
    padding: 4px 8px 4px 24px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg-primary); color: var(--text-primary);
    font-size: 11px; outline: none; transition: border-color 0.15s;
    position: relative;
  }
  .search-box:focus { border-color: var(--accent-blue); }
  .search-box::placeholder { color: var(--text-muted); }
  .search-wrap { position: relative; flex: 1; max-width: 280px; }
  .search-icon {
    position: absolute; left: 7px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 12px; pointer-events: none;
  }

  .filter-btn {
    padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg-tertiary); color: var(--text-secondary);
    font-size: 10px; cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .filter-btn.has-filter { color: var(--accent-blue); border-color: var(--accent-blue); }

  /* ===== Three Column Layout ===== */
  .columns { display: flex; flex: 1; min-height: 0; }

  /* --- Left: Branches --- */
  .col-branches {
    width: 200px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    background: var(--bg-secondary);
  }
  .col-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-secondary);
  }
  .col-header-actions { display: flex; gap: 4px; }
  .icon-btn {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: var(--radius);
    background: transparent; color: var(--text-muted);
    cursor: pointer; font-size: 13px; transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  .branch-groups { flex: 1; overflow-y: auto; padding: 4px 0; }

  .group-header {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px; cursor: pointer; user-select: none;
    color: var(--text-muted); font-size: 11px; font-weight: 600;
    transition: background 0.1s;
  }
  .group-header:hover { background: var(--bg-tertiary); }
  .group-chevron { font-size: 8px; transition: transform 0.15s; display: inline-block; }
  .group-header.collapsed .group-chevron { transform: rotate(-90deg); }
  .group-count {
    margin-left: auto; background: var(--bg-tertiary);
    padding: 0 5px; border-radius: 8px; font-size: 9px; color: var(--text-muted);
  }

  .branch-item {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 10px 3px 22px;
    cursor: pointer; transition: background 0.1s;
    font-size: 12px; position: relative;
  }
  .branch-item:hover { background: var(--bg-hover); }
  .branch-item.selected { background: rgba(97,175,239,0.12); }
  .branch-item.current { color: var(--accent-green); font-weight: 600; }
  .branch-star { color: var(--accent-yellow); font-size: 11px; flex-shrink: 0; }
  .branch-icon { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }
  .branch-name {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .branch-item.selected .branch-name { color: var(--accent-blue); }
  .branch-item.current .branch-name { color: var(--accent-green); }

  .branch-actions-bottom {
    padding: 6px 10px; border-top: 1px solid var(--border);
    display: flex; gap: 4px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg-tertiary); color: var(--text-secondary);
    font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent-blue); }

  /* --- Middle: Commits Log --- */
  .col-commits {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
  }

  .commit-list { flex: 1; overflow-y: auto; }

  .commit-item {
    display: flex; gap: 8px;
    padding: 5px 10px;
    cursor: pointer; transition: background 0.1s;
    border-bottom: 1px solid rgba(24,26,31,0.5);
    position: relative;
  }
  .commit-item:hover { background: var(--bg-tertiary); }
  .commit-item.selected { background: rgba(97,175,239,0.12); }

  .commit-graph {
    width: 24px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .graph-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 2px solid; flex-shrink: 0; z-index: 1;
    background: var(--bg-primary);
  }
  .graph-line {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 2px; background: var(--accent-blue); opacity: 0.4;
  }

  .commit-content { flex: 1; min-width: 0; }
  .commit-msg {
    font-size: 12px; color: var(--text-primary);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    line-height: 1.4;
  }
  .commit-meta {
    display: flex; gap: 8px; margin-top: 1px;
    font-size: 10px; color: var(--text-muted);
  }
  .commit-hash { font-family: "SF Mono","Fira Code",monospace; color: var(--accent-blue); }
  .commit-author { }
  .commit-time { }

  /* --- Right: Details --- */
  .col-details {
    width: 340px; flex-shrink: 0;
    display: flex; flex-direction: column;
    background: var(--bg-secondary);
  }

  .detail-header { padding: 10px; border-bottom: 1px solid var(--border); }
  .detail-hash {
    font-family: "SF Mono","Fira Code",monospace;
    font-size: 13px; color: var(--accent-blue); font-weight: 600;
    margin-bottom: 4px;
  }
  .detail-msg { font-size: 13px; color: var(--text-primary); font-weight: 500; margin-bottom: 6px; line-height: 1.4; }
  .detail-author {
    font-size: 11px; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px;
  }
  .author-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent-blue); opacity: 0.7;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: #fff; font-weight: 700; flex-shrink: 0;
  }

  .changed-files-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-secondary);
  }
  .file-count {
    background: var(--bg-tertiary); color: var(--text-muted);
    padding: 0 6px; border-radius: 10px; font-size: 10px;
  }

  .file-list { flex: 0 0 auto; max-height: 200px; overflow-y: auto; }
  .file-list::-webkit-scrollbar { width: 5px; }
  .file-list::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }

  .file-item {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 10px; cursor: pointer; transition: background 0.1s;
    font-size: 12px;
  }
  .file-item:hover { background: var(--bg-hover); }
  .file-item.selected { background: rgba(97,175,239,0.12); }

  .file-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.7; }
  .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }

  .status-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 16px; border-radius: 3px;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .status-M { color: var(--badge-m); background: rgba(229,192,123,0.15); }
  .status-A { color: var(--badge-a); background: rgba(152,195,121,0.15); }
  .status-D { color: var(--badge-d); background: rgba(224,108,117,0.15); }
  .status-R { color: var(--badge-r); background: rgba(198,120,221,0.15); }

  .file-stats { display: flex; gap: 4px; font-size: 10px; flex-shrink: 0; }
  .stat-add { color: var(--accent-green); }
  .stat-del { color: var(--accent-red); }

  /* --- Diff Area --- */
  .diff-area {
    flex: 1; min-height: 0; overflow: auto;
    border-top: 1px solid var(--border);
  }
  .diff-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 10px; background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .diff-file-name { color: var(--text-primary); font-weight: 500; }
  .diff-view-toggle { display: flex; gap: 2px; }
  .diff-toggle-btn {
    padding: 2px 6px; border: 1px solid transparent; border-radius: 3px;
    background: transparent; color: var(--text-muted); font-size: 10px;
    cursor: pointer; transition: all 0.15s;
  }
  .diff-toggle-btn:hover { color: var(--text-secondary); }
  .diff-toggle-btn.active { color: var(--accent-blue); border-color: var(--accent-blue); }

  .diff-content { padding: 0; font-family: "SF Mono","Fira Code",monospace; font-size: 11px; }
  .diff-line { display: flex; }
  .diff-line-num { width: 40px; text-align: right; color: var(--text-muted); padding: 0 6px; flex-shrink: 0; user-select: none; }
  .diff-line-text { flex: 1; padding: 0 8px; white-space: pre-wrap; }
  .diff-line.added { background: rgba(63,185,80,0.10); }
  .diff-line.removed { background: rgba(248,81,73,0.10); }
  .diff-line.hunk-header { background: var(--bg-tertiary); color: var(--accent-blue); font-weight: 500; }
  .diff-sign { width: 14px; flex-shrink: 0; text-align: center; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 3px; }

  /* Context Menu */
  .context-menu {
    position: fixed; background: var(--bg-secondary);
    border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    padding: 4px 0; z-index: 200; min-width: 160px;
    display: none;
  }
  .context-menu.show { display: block; }
  .context-menu-item {
    padding: 5px 12px; cursor: pointer; font-size: 11px;
    color: var(--text-primary); transition: background 0.1s;
    display: flex; align-items: center; gap: 8px;
  }
  .context-menu-item:hover { background: var(--bg-hover); }
  .context-menu-item.danger { color: var(--accent-red); }
  .context-menu-sep { height: 1px; background: var(--border); margin: 4px 0; }
  .context-shortcut { margin-left: auto; color: var(--text-muted); font-size: 10px; }
</style>
</head>

</div>

<!-- Context Menu -->

  { type: "added", num2: 26, text: "+" },
  { type: "context", num1: 17, num2: 27, text: "export interface Worktree {" },
  { type: "context", num1: 18, num2: 28, text: "  path: string;" },
  { type: "context", num1: 19, num2: 29, text: "  branch: string;" },
  { type: "context", num1: 20, num2: 30, text: "  head: string;" },
  { type: "context", num1: 21, num2: 31, text: "}" },
];

// ===== State =====
let selectedBranch = "main";
let selectedCommit = 0;
let selectedFile = 0;
let collapsedGroups = new Set();
let filterMode = { branch: null, user: null, date: null };

// ===== Render Branches =====
function renderBranches() {
  const el = document.getElementById("branchGroups");
  const groups = [
    { key: "local", label: "Local", icon: "", items: BRANCHES.local },
    { key: "remote", label: "Remote", icon: "", items: BRANCHES.remote },
    { key: "tags", label: "Tags", icon: "", items: BRANCHES.tags },
  ];

  let html = "";
  for (const g of groups) {
    const collapsed = collapsedGroups.has(g.key);
    html += `<div class="group-header ${collapsed ? "collapsed" : ""}" onclick="toggleGroup('${g.key}')">
      <span class="group-chevron">▼</span>
      <span>${g.label}</span>
      <span class="group-count">${g.items.length}</span>
    </div>`;

    if (!collapsed) {
      for (const b of g.items) {
        const isCurrent = b.current;
        const isSelected = b.name === selectedBranch;
        html += `<div class="branch-item ${isCurrent ? "current" : ""} ${isSelected ? "selected" : ""}"
          onclick="selectBranch('${b.name}')"
          oncontextmenu="showCtx(event, '${b.name}')">
          ${isCurrent ? '<span class="branch-star">★</span>' : '<span class="branch-icon"> </span>'}
          <span class="branch-name">${b.name}</span>
        </div>`;
      }
    }
  }
  el.innerHTML = html;
}

function toggleGroup(key) {
  if (collapsedGroups.has(key)) collapsedGroups.delete(key);
  else collapsedGroups.add(key);
  renderBranches();
}

function selectBranch(name) {
  selectedBranch = name;
  selectedCommit = 0;
  renderBranches();
  renderCommits();
  renderDetail();
}

// ===== Render Commits =====
function renderCommits() {
  const el = document.getElementById("commitList");
  const query = document.getElementById("searchInput").value.toLowerCase();
  const graphColors = ["var(--accent-blue)", "var(--accent-green)", "var(--accent-yellow)"];

  let filtered = COMMITS;
  if (query) {
    filtered = filtered.filter(c =>
      c.msg.toLowerCase().includes(query) ||
      c.hash.includes(query) ||
      c.author.toLowerCase().includes(query)
    );
  }

  el.innerHTML = filtered.map((c, i) => {
    const lanes = c.graph || [0];
    const primaryLane = lanes[0];
    const color = graphColors[primaryLane % graphColors.length];

    return `<div class="commit-item ${i === selectedCommit ? "selected" : ""}" onclick="selectCommit(${i})">
      <div class="commit-graph">
        <div class="graph-dot" style="border-color:${color}"></div>
        ${c.merge ? `<div class="graph-dot" style="border-color:${graphColors[1]};position:absolute;top:2px;left:14px;width:6px;height:6px"></div>` : ""}
      </div>
      <div class="commit-content">
        <div class="commit-msg">${c.msg}</div>
        <div class="commit-meta">
          <span class="commit-hash">${c.hash}</span>
          <span class="commit-author">${c.author}</span>
          <span class="commit-time">${c.time}</span>
        </div>
      </div>
    </div>`;
  }).join("");
}

function filterCommits() { renderCommits(); }

function selectCommit(idx) {
  selectedCommit = idx;
  selectedFile = 0;
  renderCommits();
  renderDetail();
}

// ===== Render Detail =====
function renderDetail() {
  const c = COMMITS[selectedCommit] || COMMITS[0];

  document.getElementById("detailHeader").innerHTML = `
    <div class="detail-hash">${c.full}</div>
    <div class="detail-msg">${c.msg}</div>
    <div class="detail-author">
      <span class="author-avatar">${c.author[0].toUpperCase()}</span>
      <span>${c.author} &lt;${c.author}@users.noreply.github.com&gt;</span>
    </div>
    <div style="font-size:10px;color:var(--text-muted);margin-top:4px">${c.time}</div>
  `;

  document.getElementById("fileCount").textContent = COMMIT_FILES.length;
  renderFileList();
  renderDiff();
}

function renderFileList() {
  const el = document.getElementById("fileList");
  el.innerHTML = COMMIT_FILES.map((f, i) => {
    const fname = f.path.split("/").pop();
    return `<div class="file-item ${i === selectedFile ? "selected" : ""}" onclick="selectFile(${i})">
      <span class="status-badge status-${f.status}" title="${statusLabel(f.status)}">${f.status}</span>
      <span class="file-name">${fname}</span>
      <span class="file-stats">
        ${f.additions ? `<span class="stat-add">+${f.additions}</span>` : ""}
        ${f.deletions ? `<span class="stat-del">-${f.deletions}</span>` : ""}
      </span>
    </div>`;
  }).join("");
}

function selectFile(idx) {
  selectedFile = idx;
  renderFileList();
  renderDiff();
}

function renderDiff() {
  const f = COMMIT_FILES[selectedFile] || COMMIT_FILES[0];
  document.getElementById("diffFileName").textContent = f.path;
  const el = document.getElementById("diffContent");

  el.innerHTML = MOCK_DIFF.map(line => {
    if (line.type === "hunk") {
      return `<div class="diff-line hunk-header"><span class="diff-line-num"></span><span class="diff-line-text">${line.text}</span></div>`;
    }
    const cls = line.type === "added" ? "added" : line.type === "removed" ? "removed" : "";
    const sign = line.type === "added" ? "+" : line.type === "removed" ? "-" : " ";
    const num1 = line.num1 ?? "";
    const num2 = line.num2 ?? "";
    const content = line.text.startsWith("+") || line.text.startsWith("-") ? line.text.slice(1) : line.text;
    return `<div class="diff-line ${cls}">
      <span class="diff-line-num">${line.type !== "added" ? num1 : ""}</span>
      <span class="diff-line-num">${line.type !== "removed" ? num2 : ""}</span>
      <span class="diff-sign">${sign}</span>
      <span class="diff-line-text">${content}</span>
    </div>`;
  }).join("");
}

function statusLabel(s) {
  return { M: "Modified", A: "Added", D: "Deleted", R: "Renamed", U: "Untracked" }[s] || s;
}

// ===== Context Menu =====
function showCtx(e, branchName) {
  e.preventDefault();
  const menu = document.getElementById("contextMenu");
  menu.style.left = e.clientX + "px";
  menu.style.top = e.clientY + "px";
  menu.classList.add("show");
}
function closeCtx() { document.getElementById("contextMenu").classList.remove("show"); }
document.addEventListener("click", closeCtx);

// ===== Toolbar =====
function switchTab(btn) {
  document.querySelectorAll(".toolbar-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
function toggleFilter(type) {
  const btn = document.getElementById("filter" + type.charAt(0).toUpperCase() + type.slice(1));
  btn.classList.toggle("has-filter");
}

// ===== Theme =====
function setTheme(name) {
  document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  const r = document.documentElement.style;
  const themes = {
    "one-dark-pro": { bg1:"#282c34",bg2:"#21252b",bg3:"#2c313c",hover:"#3e4451",t1:"#abb2bf",t2:"#828997",tm:"#5c6370",border:"#181a1f",blue:"#61afef",green:"#98c379",yellow:"#e5c07b",red:"#e06c75",purple:"#c678dd" },
    dark: { bg1:"#000000",bg2:"#0a0a0a",bg3:"#141414",hover:"#222222",t1:"#ededed",t2:"#888888",tm:"#666666",border:"#333333",blue:"#61afef",green:"#98c379",yellow:"#e5c07b",red:"#e06c75",purple:"#c678dd" },
    light: { bg1:"#ffffff",bg2:"#f5f5f5",bg3:"#e8e8e8",hover:"#e0e0e0",t1:"#1e1e1e",t2:"#6e6e6e",tm:"#a0a0a0",border:"#d4d4d4",blue:"#2f7cd3",green:"#4a9e3f",yellow:"#c49000",red:"#d32f2f",purple:"#8e24aa" },
    claude: { bg1:"#f5f0e8",bg2:"#ede8df",bg3:"#e4ddd3",hover:"#d8d0c4",t1:"#3d3225",t2:"#7a6e5d",tm:"#a09585",border:"#ccc3b5",blue:"#c96442",green:"#5a8a5e",yellow:"#b8860b",red:"#c0392b",purple:"#8e24aa" },
  };
  const t = themes[name]; if (!t) return;
  r.setProperty("--bg-primary",t.bg1); r.setProperty("--bg-secondary",t.bg2);
  r.setProperty("--bg-tertiary",t.bg3); r.setProperty("--bg-hover",t.hover);
  r.setProperty("--text-primary",t.t1); r.setProperty("--text-secondary",t.t2);
  r.setProperty("--text-muted",t.tm); r.setProperty("--border",t.border);
  r.setProperty("--accent-blue",t.blue); r.setProperty("--accent-green",t.green);
  r.setProperty("--accent-yellow",t.yellow); r.setProperty("--accent-red",t.red);
  r.setProperty("--accent-purple",t.purple);
  r.setProperty("--badge-m",t.yellow); r.setProperty("--badge-a",t.green);
  r.setProperty("--badge-d",t.red); r.setProperty("--badge-r",t.purple);
  r.setProperty("--badge-u",t.tm);
  document.body.style.background = name === "light" || name === "claude" ? "#e0ddd6" : "#1e1e1e";
}

// ===== Init =====
renderBranches();
renderCommits();
renderDetail();
</script>
</body>
</html>
